<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Create Buyer Account</title>
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='img/icon.png') }}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script
      src="https://kit.fontawesome.com/8584240c12.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --twitch-bg-primary: #0e0e10;
        --twitch-bg-secondary: #18181b;
        --twitch-bg-tertiary: #1f1f23;
        --twitch-bg-hover: #26262c;
        --twitch-purple: #9147ff;
        --twitch-purple-hover: #772ce8;
        --twitch-text-primary: #efeff1;
        --twitch-text-secondary: #adadb8;
        --twitch-border: #2d2d35;
      }
      
      body {
        background: var(--twitch-bg-primary);
        color: var(--twitch-text-primary);
      }
    </style>
  </head>

  <body class="font-inter">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#18181b] border-b border-[#2d2d35]">
      <div class="container mx-auto px-3 sm:px-4 py-2 sm:py-3 flex items-center justify-between">
        <div class="inline-block flex-shrink-0">
          <a href="/" class="block hover:opacity-80 transition-opacity">
            <img
              src="{{ url_for('static', filename='img/logo.jpg') }}"
              alt="Bashpo Logo"
              class="w-12 h-8 rounded"
            />
          </a>
        </div>

        <div class="absolute left-1/2 transform -translate-x-1/2">
          <h1
            class="text-lg sm:text-2xl lg:text-3xl font-extrabold text-[#efeff1] tracking-wider sm:tracking-widest"
            style="font-family: 'Manrope', sans-serif"
          >
            B A S H P O
          </h1>
        </div>

        <div class="flex items-center space-x-2">
          <a
            href="/login"
            class="bg-[#1f1f23] hover:bg-[#26262c] border border-[#2d2d35] text-[#efeff1] font-medium rounded px-3 py-1.5 sm:px-4 sm:py-2 transition-colors text-xs sm:text-sm"
            >Login</a
          >
        </div>
      </div>
    </header>

    <!-- Main Section -->
    <main class="relative bg-[#0e0e10] min-h-screen py-6 sm:py-12">
      <div class="container mx-auto px-4 max-w-4xl">
        <div class="text-center mb-6 sm:mb-12">
          <h1
            class="text-2xl sm:text-4xl lg:text-5xl font-bold text-[#efeff1] mb-2 sm:mb-4"
          >
            Create Buyer Account
          </h1>
          <p class="text-[#adadb8] text-sm sm:text-lg">
            Join Bashpo and start buying games easily
          </p>
        </div>

        <!-- Registration Form Card -->
        <div class="bg-[#18181b] border border-[#2d2d35] rounded p-4 sm:p-8 lg:p-12">
          <form id="buyerForm" class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
            <!-- Left Column -->
            <div class="space-y-4 sm:space-y-6">
              <div class="form-control">
                <label class="label">
                  <span
                    class="label-text font-semibold text-[#efeff1] flex items-center text-xs sm:text-sm"
                  >
                    <i class="fas fa-user text-[#9147ff] mr-2"></i>
                    Full Name
                  </span>
                </label>
                <input
                  type="text"
                  id="user_name"
                  name="user_name"
                  class="w-full px-3 sm:px-4 py-2 bg-[#1f1f23] border border-[#2d2d35] rounded text-[#efeff1] placeholder-[#adadb8] focus:outline-none focus:ring-2 focus:ring-[#9147ff] text-xs sm:text-sm"
                  placeholder="Enter your name"
                  required
                />
              </div>

              <div class="form-control">
                <label class="label">
                  <span
                    class="label-text font-semibold text-[#efeff1] flex items-center text-xs sm:text-sm"
                  >
                    <i class="fas fa-envelope text-[#9147ff] mr-2"></i>
                    Email
                  </span>
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="w-full px-3 sm:px-4 py-2 bg-[#1f1f23] border border-[#2d2d35] rounded text-[#efeff1] placeholder-[#adadb8] focus:outline-none focus:ring-2 focus:ring-[#9147ff] text-xs sm:text-sm"
                  placeholder="Enter your email"
                  pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                  title="Please enter a valid email address"
                  required
                />
              </div>

              <div class="form-control">
                <label class="label">
                  <span
                    class="label-text font-semibold text-[#efeff1] flex items-center text-xs sm:text-sm"
                  >
                    <i class="fas fa-lock text-[#9147ff] mr-2"></i>
                    Password
                  </span>
                </label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="w-full px-3 sm:px-4 py-2 bg-[#1f1f23] border border-[#2d2d35] rounded text-[#efeff1] placeholder-[#adadb8] focus:outline-none focus:ring-2 focus:ring-[#9147ff] text-xs sm:text-sm"
                  placeholder="Enter your password (min. 8 characters)"
                  minlength="8"
                  title="Password must be at least 8 characters long"
                  required
                />
                <label class="label">
                  <span class="label-text-alt text-[#adadb8] text-xs"
                    >💡 Password must be at least 8 characters</span
                  >
                </label>
              </div>
            </div>

            <!-- Right Column -->
            <div class="space-y-4 sm:space-y-6">
              <div class="form-control">
                <label class="label">
                  <span
                    class="label-text font-semibold text-[#efeff1] flex items-center text-xs sm:text-sm"
                  >
                    <i class="fas fa-map-marker-alt text-[#9147ff] mr-2"></i>
                    Address
                  </span>
                </label>
                <input
                  type="text"
                  id="buyer_address"
                  name="buyer_address"
                  class="w-full px-3 sm:px-4 py-2 bg-[#1f1f23] border border-[#2d2d35] rounded text-[#efeff1] placeholder-[#adadb8] focus:outline-none focus:ring-2 focus:ring-[#9147ff] text-xs sm:text-sm"
                  placeholder="Enter your address"
                  required
                />
              </div>

              <div class="form-control">
                <label class="label">
                  <span
                    class="label-text font-semibold text-[#efeff1] flex items-center text-xs sm:text-sm"
                  >
                    <i class="fas fa-globe text-[#9147ff] mr-2"></i>
                    Store Region
                  </span>
                </label>
                <select
                  id="store_region"
                  name="store_region"
                  class="w-full px-3 sm:px-4 py-2 bg-[#1f1f23] border border-[#2d2d35] rounded text-[#efeff1] focus:outline-none focus:ring-2 focus:ring-[#9147ff] text-xs sm:text-sm"
                  required
                >
                  <option value="" disabled selected>Select Region</option>
                  <option value="NA">North America</option>
                  <option value="LA">Latin America</option>
                  <option value="EU">Europe</option>
                  <option value="ASI">Asia</option>
                </select>
                <label class="label">
                  <span class="label-text-alt text-[#adadb8] text-xs"
                    >💡 Region cannot be changed later</span
                  >
                </label>
              </div>
            </div>

            <!-- Full Width Submit Section -->
            <div class="lg:col-span-2 text-center mt-4 sm:mt-6">
              <div id="error-message" class="bg-[#eb0400] text-white px-4 py-2 rounded text-xs sm:text-sm mb-4 hidden">
                <span></span>
              </div>
              <button
                type="button"
                class="w-full sm:w-auto bg-[#9147ff] hover:bg-[#772ce8] text-white font-medium rounded px-8 sm:px-12 py-2 sm:py-3 transition-colors text-sm sm:text-base"
                onclick="sendBuyerRegistrationData()"
              >
                Create Account
              </button>
              <p class="text-[#adadb8] mt-3 sm:mt-4 text-xs sm:text-sm">
                Already have an account?
                <a
                  href="/login"
                  class="text-[#9147ff] hover:text-[#772ce8] font-medium"
                  >Sign in here</a
                >
              </p>
            </div>
          </form>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#0e0e10] border-t border-[#2d2d35] mt-12 sm:mt-20">
      <div class="container mx-auto px-4 py-8 sm:py-12">
        <div
          class="flex flex-col lg:flex-row justify-between items-center gap-6 sm:gap-8"
        >
          <div
            class="flex flex-col items-center lg:items-start text-center lg:text-left"
          >
            <div class="flex items-center space-x-3 mb-4">
              <img
                src="{{ url_for('static', filename='img/logo.jpg') }}"
                alt="Bashpo Logo"
                class="w-12 h-8 sm:w-14 sm:h-10 rounded"
              />
              <div>
                <h1 class="text-lg sm:text-xl font-bold text-[#efeff1]">
                  Bashpo
                </h1>
                <p class="text-xs text-[#adadb8]">Gaming Platform</p>
              </div>
            </div>
            <p class="text-[#adadb8] max-w-md text-sm sm:text-base">
              Find everything you love, in one place. Your ultimate gaming
              destination.
            </p>
          </div>

          <div class="text-center lg:text-right">
            <h6 class="text-[#efeff1] font-bold mb-4 text-sm sm:text-base">Find Us on Socials</h6>
            <div class="flex justify-center lg:justify-end gap-3 sm:gap-4">
              <a
                href="#"
                class="w-8 h-8 sm:w-10 sm:h-10 bg-[#1f1f23] hover:bg-[#9147ff] rounded-full flex items-center justify-center transition-colors"
              >
                <i class="fab fa-youtube text-[#efeff1]"></i>
              </a>
              <a
                href="#"
                class="w-8 h-8 sm:w-10 sm:h-10 bg-[#1f1f23] hover:bg-[#9147ff] rounded-full flex items-center justify-center transition-colors"
              >
                <i class="fab fa-facebook text-[#efeff1]"></i>
              </a>
              <a
                href="#"
                class="w-8 h-8 sm:w-10 sm:h-10 bg-[#1f1f23] hover:bg-[#9147ff] rounded-full flex items-center justify-center transition-colors"
              >
                <i class="fab fa-instagram text-[#efeff1]"></i>
              </a>
              <a
                href="#"
                class="w-8 h-8 sm:w-10 sm:h-10 bg-[#1f1f23] hover:bg-[#9147ff] rounded-full flex items-center justify-center transition-colors"
              >
                <i class="fab fa-x-twitter text-[#efeff1]"></i>
              </a>
              <a
                href="#"
                class="w-8 h-8 sm:w-10 sm:h-10 bg-[#1f1f23] hover:bg-[#9147ff] rounded-full flex items-center justify-center transition-colors"
              >
                <i class="fab fa-tiktok text-[#efeff1]"></i>
              </a>
              <a
                href="#"
                class="w-8 h-8 sm:w-10 sm:h-10 bg-[#1f1f23] hover:bg-[#9147ff] rounded-full flex items-center justify-center transition-colors"
              >
                <i class="fab fa-discord text-[#efeff1]"></i>
              </a>
            </div>
          </div>
        </div>

        <div class="border-t border-[#2d2d35] mt-6 sm:mt-8 pt-6 text-center">
          <p class="text-[#adadb8] text-xs sm:text-sm">
            <i class="fa-regular fa-copyright mr-1"></i>
            2025 Bashpo. All rights reserved.
          </p>
        </div>
      </div>
    </footer>

    <script>
      async function sendBuyerRegistrationData() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById('error-message');
        errorDiv.classList.add('hidden');

        // Email validation
        const emailPattern = /^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/i;
        if (!emailPattern.test(email)) {
          errorDiv.querySelector('span').innerText = 'Please enter a valid email address.';
          errorDiv.classList.remove('hidden');
          return;
        }

        // Password validation
        if (password.length < 8) {
          errorDiv.querySelector('span').innerText = 'Password must be at least 8 characters long.';
          errorDiv.classList.remove('hidden');
          return;
        }

        const formData = {
          user_name: document.getElementById("user_name").value,
          email: email,
          password: password,
          buyer_address: document.getElementById("buyer_address").value,
          store_region: document.getElementById("store_region").value,
          card_info: " ",
        };

        try {
          const response = await fetch("/create_buyer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData),
          });
          const result = await response.json();
          if (response.ok) {
            alert(result.success);
            window.location.href = result.redirect_url;
          } else {
            errorDiv.querySelector('span').innerText = result.error || 'An error occurred. Please try again.';
            errorDiv.classList.remove('hidden');
          }
        } catch (error) {
          console.error("Error:", error);
          errorDiv.querySelector('span').innerText = 'An unexpected error occurred. Please try again.';
          errorDiv.classList.remove('hidden');
        }
      }
    </script>
  </body>
</html>
